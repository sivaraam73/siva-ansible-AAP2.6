---
- name: Create postgresql CLI aliases
  ansible.builtin.include_role:
    name: postgresql
    tasks_from: cli.yml
  vars:
    _postgresql_socket: '{{ lightspeed_pg_socket | default("") }}'
    _postgresql_cert_auth: '{{ lightspeed_pg_cert_auth }}'
    _postgresql_src_dir: '{{ lightspeed_conf_dir }}'
    _postgresql_dest_dir: /etc/ansible-automation-platform/lightspeed

- name: Add postgresql TLS environment variable for certificate authentication
  ansible.builtin.set_fact:
    _common_pg_env: '{{ _common_pg_env | combine(_lightspeed_pg_ssl) }}'
  vars:
    _lightspeed_pg_ssl:
      PGSSLCERT: /etc/ansible-automation-platform/lightspeed/postgresql.cert
      PGSSLKEY: /etc/ansible-automation-platform/lightspeed/postgresql.key
      PGSSLROOTCERT: '{{ ca_trust_bundle }}'
  when: lightspeed_pg_cert_auth | bool

- name: Backup the lightspeed postgresql database
  community.postgresql.postgresql_db:
    name: '{{ lightspeed_pg_database }}'
    login_host: '{{ lightspeed_pg_host }}'
    login_port: '{{ lightspeed_pg_port }}'
    login_user: '{{ lightspeed_pg_username }}'
    login_password: '{{ lightspeed_pg_password | default(omit) }}'
    login_unix_socket: '{{ lightspeed_pg_socket | default(omit) }}'
    ssl_mode: '{{ lightspeed_pg_sslmode }}'
    target: '{{ ansible_user_dir }}/aap/backups/{{ lightspeed_db_filename }}'
    target_opts: '--clean --create'
    state: dump
  environment: '{{ _common_pg_env }}'
  run_once: true

- name: Archive the lightspeed data
  ansible.containerized_installer.archive:
    path:
      - '{{ ansible_user_dir }}/.local/share/containers/storage/secrets'
      - '{{ ansible_user_dir }}/aap/backups/{{ lightspeed_db_filename }}'
      - '{{ ansible_user_dir }}/aap/lightspeed'
      - '{{ ansible_user_dir }}/aap/tls'
    dest: '{{ ansible_user_dir }}/aap/backups/lightspeed.{{ lightspeed_archive_extension }}'
    format: '{{ lightspeed_use_archive_compression | bool | ternary(omit, archive_decompressed_extension) }}'
    mode: '0640'

- name: Download the lightspeed tarball
  ansible.builtin.fetch:
    src: '{{ ansible_user_dir }}/aap/backups/lightspeed.{{ lightspeed_archive_extension }}'
    dest: '{{ hostvars["localhost"]["_backup_dir"] }}/lightspeed_{{ inventory_hostname }}.{{ lightspeed_archive_extension }}'
    flat: true
...
