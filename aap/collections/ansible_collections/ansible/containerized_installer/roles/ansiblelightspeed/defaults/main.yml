---
### container
container_log_driver: journald

### common
aap_volumes_dir: '{{ ansible_user_dir }}/aap'
archive_compressed_extension: tar.gz
archive_decompressed_extension: tar
db_compressed_extension: db.gz
db_decompressed_extension: db
client_request_timeout: 30

### backup/restore
lightspeed_use_archive_compression: '{{ use_archive_compression | default(true) }}'
lightspeed_use_db_compression: '{{ use_db_compression | default(false) }}'

### nginx
lightspeed_nginx_conf_dir: '{{ aap_volumes_dir }}/lightspeed/nginx/etc'
lightspeed_nginx_disable_https: false
lightspeed_nginx_disable_hsts: false
lightspeed_nginx_hsts_max_age: 63072000
lightspeed_nginx_http_port: 8084
lightspeed_nginx_https_port: 8447
lightspeed_nginx_https_protocols:
  - TLSv1.2
  - TLSv1.3
lightspeed_nginx_client_max_body_size: 5m
lightspeed_nginx_user_headers: []
lightspeed_nginx_read_timeout: '{{ (([(client_request_timeout | int), 10] | max) / 2) | int }}'

### lightspeed
lightspeed_admin_user: admin
lightspeed_admin_email: admin@example.com
lightspeed_container_requires: []
lightspeed_conf_dir: '{{ aap_volumes_dir }}/lightspeed/etc'
lightspeed_static_dir: '{{ aap_volumes_dir }}/lightspeed/static'
lightspeed_firewall_zone: public
lightspeed_extra_settings: []
lightspeed_tls_remote: false
lightspeed_django_metrics_dir: '{{ aap_volumes_dir }}/lightspeed/django_metrics'
lightspeed_uwsgi_processes: '{{ ansible_processor_vcpus | default(4) | int * 2 + 1 }}'
lightspeed_uwsgi_timeout: '{{ (([(client_request_timeout | int), 180] | max) / 3) | int }}'
lightspeed_uwsgi_timeout_grace_period: 2
lightspeed_uwsgi_listen_queue_size: 2048

#### lightspeed chatbot
lightspeed_chatbot_conf_dir: '{{ aap_volumes_dir }}/lightspeed/etc/chatbot'
lightspeed_chatbot_data_dir: '{{ aap_volumes_dir }}/lightspeed/chatbot'
lightspeed_chatbot_http_port: 8085
lightspeed_chatbot_https_port: 8449
lightspeed_chatbot_disable_https: false
lightspeed_chat_rate_throttle: '10/minute'
lightspeed_chatbot_chatbot_max_tokens: 4096
lightspeed_chatbot_model_verify_ssl: true
lightspeed_chatbot_default_provider: 'rhoai'
lightspeed_chatbot_model_extra_settings: {}
lightspeed_chatbot_agent_extra_settings: {}

#### lightspeed mcp
lightspeed_mcp_controller_enabled: false
lightspeed_mcp_controller_port: 8004
lightspeed_mcp_lightspeed_enabled: false
lightspeed_mcp_lightspeed_port: 8005

#### lightspeed WCA
lightspeed_wca_model_type: 'wca'
lightspeed_wca_model_url: 'https://api.dataplatform.cloud.ibm.com'
lightspeed_wca_model_verify_ssl: true
lightspeed_wca_model_enable_anonymization: true
lightspeed_wca_health_check: true

### database
lightspeed_pg_username: lightspeed
lightspeed_pg_database: lightspeed
lightspeed_pg_port: 5432
lightspeed_pg_sslmode: prefer
lightspeed_pg_cert_auth: false

### TLS CA
ca_trust_bundle: /etc/pki/tls/certs/ca-bundle.crt
...
