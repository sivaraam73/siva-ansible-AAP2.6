---
- name: Configure metrics utility environment
  when: metrics_utility_enabled | default(false) | bool
  block:
    - name: Ensure metrics data directory exists
      ansible.builtin.file:
        path: "{{ metrics_data_dir }}"
        state: directory
        mode: '0755'

    - name: Create metrics environment file
      ansible.builtin.template:
        src: metrics.env.j2
        dest: "{{ _metrics_env_file_path }}"
        mode: '0600'
      register: _metrics_env_file
...
