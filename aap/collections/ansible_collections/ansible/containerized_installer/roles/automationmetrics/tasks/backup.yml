---
- name: Create postgresql CLI aliases
  ansible.builtin.include_role:
    name: postgresql
    tasks_from: cli.yml
  vars:
    _postgresql_socket: '{{ automationmetrics_pg_socket | default("") }}'
    _postgresql_cert_auth: '{{ automationmetrics_pg_cert_auth }}'
    _postgresql_src_dir: '{{ automationmetrics_config_path }}'
    _postgresql_dest_dir: /etc/automationmetrics

- name: Add postgresql TLS environment variable for certificate authentication
  ansible.builtin.set_fact:
    _common_pg_env: '{{ _common_pg_env | combine(_automationmetrics_pg_ssl) }}'
  vars:
    _automationmetrics_pg_ssl:
      PGSSLCERT: '{{ automationmetrics_config_path }}/postgresql.cert'
      PGSSLKEY: '{{ automationmetrics_config_path }}/postgresql.key'
      PGSSLROOTCERT: '{{ ca_trust_bundle }}'
  when: automationmetrics_pg_cert_auth | bool

- name: Backup the automationmetrics postgresql database
  community.postgresql.postgresql_db:
    name: '{{ automationmetrics_pg_database }}'
    login_host: '{{ automationmetrics_pg_host }}'
    login_port: '{{ automationmetrics_pg_port }}'
    login_user: '{{ automationmetrics_pg_username }}'
    login_password: '{{ automationmetrics_pg_password | default(omit) }}'
    login_unix_socket: '{{ automationmetrics_pg_socket | default(omit) }}'
    ssl_mode: '{{ automationmetrics_pg_sslmode }}'
    target: '{{ ansible_user_dir }}/aap/backups/{{ automationmetrics_db_filename }}'
    target_opts: '--clean --create'
    state: dump
  environment: '{{ _common_pg_env }}'
  no_log: true
  run_once: true

- name: Archive the automationmetrics data
  ansible.containerized_installer.archive:
    path:
      - '{{ ansible_user_dir }}/.local/share/containers/storage/secrets'
      - '{{ ansible_user_dir }}/aap/backups/{{ automationmetrics_db_filename }}'
      - '{{ automationmetrics_volume_path }}'
      - '{{ ansible_user_dir }}/aap/tls'
    dest: >-
      {{ ansible_user_dir }}/aap/backups/automationmetrics.{{
        automationmetrics_archive_extension
      }}
    format: >-
      {{ automationmetrics_use_archive_compression | bool |
        ternary(omit, archive_decompressed_extension)
      }}
    mode: '0640'

- name: Download the automationmetrics tarball
  ansible.builtin.fetch:
    src: >-
      {{ ansible_user_dir }}/aap/backups/automationmetrics.{{
        automationmetrics_archive_extension
      }}
    dest: >-
      {{ hostvars["localhost"]["_backup_dir"] }}/automationmetrics_{{
        inventory_hostname
      }}.{{ automationmetrics_archive_extension }}
    flat: true
...
