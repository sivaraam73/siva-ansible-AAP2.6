---
# Single-container deployment: Django (Gunicorn) + dispatcherd + scheduler in one process.
- name: Create the Automation Metrics Service container (all-in-one)
  containers.podman.podman_container:
    name: automation-metrics-service
    image: "{{ _automationmetrics_image }}"
    command: >-
      metrics-service run
      --host {{ _automationmetrics_bind_address | default('127.0.0.1') }}
      --port {{ automationmetrics_api_port }}
    env: '{{ _automationmetrics_env }}'
    secrets: '{{ _common_secrets }}'
    volume: '{{ _common_volumes }}'
    log_driver: '{{ container_log_driver }}'
    network: host
    user: "{{ ansible_user_uid }}"
    userns: keep-id
    state: created
    recreate: "{{ __containers_recreate | default(false) }}"
    generate_systemd:
      container_prefix: ''
      path: '{{ ansible_user_dir }}/.config/systemd/user'
      separator: ''
      restart_policy: always
      requires: '{{ __systemd_requires }}'
    label: '{{ _autoupdate_label }}'
  notify: Restart automation metrics
...
