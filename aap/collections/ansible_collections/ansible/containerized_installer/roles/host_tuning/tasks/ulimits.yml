---
- name: Ensure /etc/security/limits.d directory exists
  ansible.builtin.file:
    path: /etc/security/limits.d
    state: directory
    mode: "0755"
    owner: root
    group: root
  become: true

- name: Configure ulimits via template in /etc/security/limits.d/
  ansible.builtin.template:
    src: 99-aap-limits.conf.j2
    dest: /etc/security/limits.d/99-aap-limits.conf
    mode: "0644"
    owner: root
    group: root
  become: true
