---

- name: Calculate SystemD TasksMax (80% of kernel threads-max)
  block:
    - name: Get system threads-max value
      ansible.builtin.slurp:
        src: /proc/sys/kernel/threads-max
      register: _system_threads_max_raw

    - name: Get system pid-max value
      ansible.builtin.slurp:
        src: /proc/sys/kernel/pid_max
      register: _system_pid_max_raw

    - name: Extract and validate pid-max and threads-max content
      ansible.builtin.set_fact:
        _threads_max_content: "{{ _system_threads_max_raw.content | b64decode | trim }}"
        _pid_max_content: "{{ _system_pid_max_raw.content | b64decode | trim }}"

    - name: Validate threads-max is numeric and reasonable
      ansible.builtin.fail:
        msg: "Invalid threads-max value '{{ _threads_max_content }}'. Expected numeric value >= 1000."
      when: >
        _threads_max_content | regex_search('^\d+$') is none or
        _threads_max_content | int < 1000

    - name: Set __systemd_default_tasks_max fact
      ansible.builtin.set_fact:
        __systemd_default_tasks_max: "{{ [(_threads_max_content | int * 0.8) | int, _pid_max_content | int] | min }}"

- name: Apply sysctl settings
  ansible.builtin.include_tasks: sysctl.yml

- name: Apply ulimit settings
  ansible.builtin.include_tasks: ulimits.yml
